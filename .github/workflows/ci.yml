name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BINARY_SIZE_CEILING_BYTES: 15728640 

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o monita-agent-${{ matrix.goarch }} \
            ./cmd/monita-agent

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s monita-agent-${{ matrix.goarch }})
          echo "Binary size: $SIZE bytes ($(( SIZE / 1048576 )) MB)"
          if [ "$SIZE" -gt "$BINARY_SIZE_CEILING_BYTES" ]; then
            echo "ERROR: binary exceeds 15 MB ceiling ($SIZE > $BINARY_SIZE_CEILING_BYTES)"
            exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: monita-agent-linux-${{ matrix.goarch }}
          path: monita-agent-${{ matrix.goarch }}
          retention-days: 7